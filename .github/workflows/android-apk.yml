# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  android-apk – Build a debug APK and attach it to a GitHub Release      ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║                                                                         ║
# ║  HOW TO TRIGGER                                                         ║
# ║  ──────────────                                                         ║
# ║  • Push a version tag:  git tag v0.1.0 && git push origin v0.1.0        ║
# ║    → builds the APK AND attaches it to a GitHub Release.                ║
# ║                                                                         ║
# ║  • Manual run: Actions tab → "android-apk" → Run workflow               ║
# ║    → builds the APK and uploads it as a downloadable artifact only.     ║
# ║                                                                         ║
# ║  WHAT IT DOES                                                           ║
# ║  ────────────                                                           ║
# ║  1. Checks out the repo.                                                ║
# ║  2. Installs JDK 17 + Android SDK + Godot 4.2.2 with export templates. ║
# ║  3. Generates a throwaway debug keystore via keytool.                   ║
# ║  4. Writes Godot editor_settings with SDK paths + keystore config.      ║
# ║  5. Runs a headless editor import pass to warm the resource cache.      ║
# ║  6. Exports the "Android" preset → build/beastbound.apk.               ║
# ║  7. Uploads the APK as a workflow artifact.                             ║
# ║  8. If triggered by a tag, creates/updates a GitHub Release and         ║
# ║     attaches the APK to it.                                             ║
# ║                                                                         ║
# ║  Uses the prebuilt APK template (use_gradle_build=false), so no         ║
# ║  Gradle build step is needed — but the Android SDK is still required    ║
# ║  for apksigner/aapt.  Runs entirely on free GitHub-hosted runners.      ║
# ║                                                                         ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: android-apk

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # lets you run it by hand from the Actions tab

permissions:
  contents: write          # needed to create/attach to a Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── JDK 17 ─────────────────────────────────────────────────────────
      # Provides keytool (for keystore) and jarsigner (for APK signing).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Android SDK ─────────────────────────────────────────────────────
      # Even with use_gradle_build=false, Godot 4.2 needs the Android SDK
      # (for aapt2, apksigner, etc.) and its path in editor settings.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Godot 4.2.2 ────────────────────────────────────────────────────
      # Installs the standard (non-.NET) editor and its export templates.
      # After this step, `godot` is on PATH.
      - name: Set up Godot 4.2.2 + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.2
          use-dotnet: false
          include-templates: true

      # ── Debug keystore ──────────────────────────────────────────────────
      # Create a throwaway debug keystore for CI signing.
      - name: Generate a debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "${{ github.workspace }}/debug.keystore" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12

      # ── Godot editor settings ──────────────────────────────────────────
      # Godot 4.2 reads Android SDK path, Java path, and keystore config
      # from editor_settings-4.tres.  The GODOT_ANDROID_KEYSTORE_DEBUG_*
      # env vars alone are NOT sufficient — we must also write the file
      # so the export can find aapt2/apksigner from the SDK.
      - name: Configure Godot editor settings for Android
        run: |
          mkdir -p ~/.config/godot/
          SETTINGS_FILE=~/.config/godot/editor_settings-4.tres
          echo '[gd_resource type="EditorSettings" format=3]' > "$SETTINGS_FILE"
          echo '' >> "$SETTINGS_FILE"
          echo '[resource]' >> "$SETTINGS_FILE"
          echo "export/android/android_sdk_path = \"${ANDROID_HOME}\"" >> "$SETTINGS_FILE"
          echo "export/android/java_sdk_path = \"${JAVA_HOME}\"" >> "$SETTINGS_FILE"
          echo "export/android/debug_keystore = \"${GITHUB_WORKSPACE}/debug.keystore\"" >> "$SETTINGS_FILE"
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> "$SETTINGS_FILE"
          echo 'export/android/debug_keystore_pass = "android"' >> "$SETTINGS_FILE"
          echo "--- editor_settings-4.tres ---"
          cat "$SETTINGS_FILE"

      # ── Diagnostic listing ──────────────────────────────────────────────
      - name: Diagnostic listing
        run: |
          echo "=== ENVIRONMENT ==="
          echo "ANDROID_HOME: ${ANDROID_HOME}"
          echo "JAVA_HOME: ${JAVA_HOME}"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "=== GODOT CONFIG DIR ==="
          ls -la ~/.config/godot/ || true
          echo "=== GODOT TEMPLATE DIR ==="
          find ~/.local/share/godot/ -type f || true

      # ── Import pass ────────────────────────────────────────────────────
      # Godot 4.2 does NOT have a standalone --import flag.  Start the
      # editor headlessly with --quit to trigger the import pipeline.
      # Timeout guards against hangs; non-zero exit is acceptable.
      - name: Import project resources (headless editor pass)
        run: |
          timeout 120 godot --headless --editor --path client-godot --quit || true

      # ── Export APK ──────────────────────────────────────────────────────
      - name: Export APK
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p "${{ github.workspace }}/build"
          godot --headless --verbose --path client-godot --export-debug "Android" \
            "${{ github.workspace }}/build/beastbound.apk"
          # Verify the APK was actually produced
          ls -lh "${{ github.workspace }}/build/beastbound.apk"

      # ── Upload artifact ────────────────────────────────────────────────
      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: beastbound-apk
          path: build/beastbound.apk
          if-no-files-found: error

      # ── Attach to Release ──────────────────────────────────────────────
      - name: Attach APK to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/beastbound.apk
          generate_release_notes: true
