# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  android-apk – Build a debug APK and attach it to a GitHub Release      ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║                                                                         ║
# ║  HOW TO TRIGGER                                                         ║
# ║  ──────────────                                                         ║
# ║  • Push a version tag:  git tag v0.1.0 && git push origin v0.1.0        ║
# ║    → builds the APK AND attaches it to a GitHub Release.                ║
# ║                                                                         ║
# ║  • Manual run: Actions tab → "android-apk" → Run workflow               ║
# ║    → builds the APK and uploads it as a downloadable artifact only.     ║
# ║                                                                         ║
# ║  WHAT IT DOES                                                           ║
# ║  ────────────                                                           ║
# ║  1. Checks out the repo.                                                ║
# ║  2. Installs JDK 17 (for keytool) + Godot 4.2.2 with export templates. ║
# ║  3. Generates a throwaway debug keystore via keytool.                   ║
# ║  4. Runs a headless editor import pass (warms the .godot/imported       ║
# ║     cache so the export doesn't fail on cold resources).                ║
# ║  5. Exports the "Android" preset → build/beastbound.apk.               ║
# ║  6. Uploads the APK as a workflow artifact.                             ║
# ║  7. If triggered by a tag, creates/updates a GitHub Release and         ║
# ║     attaches the APK to it.                                             ║
# ║                                                                         ║
# ║  Uses the prebuilt APK template (use_gradle_build=false), so NO         ║
# ║  Android SDK or Gradle is needed — only Godot + export templates +      ║
# ║  a debug keystore.  Runs entirely on free GitHub-hosted runners.        ║
# ║                                                                         ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: android-apk

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # lets you run it by hand from the Actions tab

permissions:
  contents: write          # needed to create/attach to a Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── JDK 17 ─────────────────────────────────────────────────────────
      # Provides `keytool` for generating the debug keystore.
      - name: Set up JDK 17 (provides keytool)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Godot 4.2.2 ────────────────────────────────────────────────────
      # Installs the standard (non-.NET) editor and its export templates.
      # After this step, `godot` is on PATH.
      - name: Set up Godot 4.2.2 + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.2
          use-dotnet: false
          include-templates: true

      # ── Debug keystore ──────────────────────────────────────────────────
      # Godot 4.2 reads Android debug signing config from env vars
      # (GODOT_ANDROID_KEYSTORE_DEBUG_*), so we don't need editor_settings
      # baked into the repo.  This creates a throwaway keystore for CI.
      - name: Generate a debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "${{ github.workspace }}/debug.keystore" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12

      # ── Import pass ────────────────────────────────────────────────────
      # Godot 4.2 does NOT have a standalone --import flag.  The correct
      # way to run the import pipeline headlessly is to start the editor
      # with --editor --quit.  This populates .godot/imported/ so the
      # export step doesn't fail on cold resources.
      #
      # We use `timeout` to guard against the editor hanging (e.g. on an
      # import dialog or a project with errors).  A non-zero exit from
      # timeout is acceptable (Godot sometimes exits with 0, sometimes
      # not after --quit).
      - name: Import project resources (headless editor pass)
        run: |
          timeout 120 godot --headless --editor --path client-godot --quit || true

      # ── Export APK ──────────────────────────────────────────────────────
      - name: Export APK
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p "${{ github.workspace }}/build"
          godot --headless --path client-godot --export-debug "Android" \
            "${{ github.workspace }}/build/beastbound.apk"
          # Verify the APK was actually produced
          ls -lh "${{ github.workspace }}/build/beastbound.apk"

      # ── Upload artifact ────────────────────────────────────────────────
      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: beastbound-apk
          path: build/beastbound.apk
          if-no-files-found: error

      # ── Attach to Release ──────────────────────────────────────────────
      - name: Attach APK to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/beastbound.apk
          generate_release_notes: true
