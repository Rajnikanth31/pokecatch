# golangci-lint config.
#
# This repo is a production-grade *vertical slice*: the core engine/battle/economy
# packages are fully implemented and tested, but it also carries intentional
# scaffolding (service mains, alternate transports, Postgres repos exercised only
# by build-tagged integration tests). We keep the linters that catch real bugs and
# relax the pedantic ones that would otherwise flag that scaffolding.
run:
  timeout: 5m

linters:
  disable:
    # `unused` flags intentionally-present scaffolding (helper methods kept for
    # symmetry, enum values not yet wired). Too noisy for a WIP slice.
    - unused

issues:
  exclude-rules:
    # Tests frequently ignore returned errors on purpose (e.g. driving a battle
    # loop); don't fail CI on that.
    - path: _test\.go
      linters:
        - errcheck
    # Postgres repos are covered by build-tagged integration tests, not the
    # default build; their unchecked-on-purpose paths shouldn't block CI.
    - path: _postgres\.go
      linters:
        - errcheck
